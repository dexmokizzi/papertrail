# Test survey — Section 2 Investment Strategies
# Registered for Sprint 1D Qualtrics mapper testing

survey_id: test_survey
version: 1
description: Test survey — 8 question Likert scale section

# Qualtrics connection
qualtrics:
  survey_id: SV_51FsjcdudIcjklU
  template: qualtrics_templates/maize_community_survey_template.xlsx

# Default settings
default_mark_type: circled_number
default_scale: [1, 2, 3, 4]

# Computed columns — Qualtrics calculates these on import
# PaperTrail leaves them blank
qualtrics_computed:
  - decision-2-first-3-items
  - overall-decision-1-infastructure-acceptable
  - decision-2-additional-amenities-acceptable
  - demonstrated trust score
  - overall-decision-2-parks-and-rec-support-tax
  - overall-decision-2-parks-and-rec-acceptable
  - overall-decision-1-infastructure-support-tax
  - public interest score
  - Q9.1 - Parent Topics
  - Q9.1 - Topics
  - Q9.1 - Topic Hierarchy Level 1
  - Q9.1 - Topic Hierarchy Level 2
  - Q9.1 - Topic Hierarchy Level 3

# Field definitions
# paper_id     = internal field name
# qualtrics_id = exact column header from Qualtrics Row 1
# regions      = calibrated pixel coordinates from calibration tool
fields:
  - paper_id: Q1
    qualtrics_id: Q3.1_1
    label: Focus on infrastructure improvements
    type: likert
    mark_type: circled_number
    scale: [1, 2, 3, 4]
    required: true
